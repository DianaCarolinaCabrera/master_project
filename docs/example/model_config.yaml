input_table_dataset: "STG"
#input_table_name: "FINAL_FEATURES_POINT_MLB_INDIVIDUALS"
input_table_name: "ALL_USERS_UNIVERSE_{site}_{audience}_{product}_{year}{month:02}{day:02}_FINAL"
output_table_dataset_tbl: "TBL"
output_table_dataset: "TBL"
output_table_dataset_stg: "STG"
output_table_name: "LK_MP_ACQ_MLC_PROPENSITY_SCORES_POINT_INDIVIDUALS"
output_table_name_hist: "LK_MP_ACQ_POINT_MODEL_HIST"
output_table_name_last_inference: "LK_MP_ACQ_PROPENSITY_MODELS"
universe_table_name: "UNIVERSE_POINT_MLC_INDIVIDUALS_20250829"

# SQL query files for data preparation
create_universe_table: "src/app/model/mlc/individual/1_0/queries/create_universe.sql"
create_scoring_table: "src/app/model/mlc/individual/1_0/queries/create_scoring_table.sql"
