site: "MLC"
product: "POINT"
audience: "INDIVIDUALS"
campaign_id: "" # Optional: used only for campaign backtesting
model_version: "1.0.0"

# Database configuration
environment: "dev"

# Performance optimization settings
debug_mode: false  # Set to true for testing with limited data
debug_limit: 10000  # Number of records to limit in debug mode
# Note: Removed query_timeout to rely on BigQuery client's default timeouts

# Input/Output table configuration
